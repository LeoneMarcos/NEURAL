<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Neural - AI News Aggregator</title>
<link rel="icon" type="image/png" href="./favicon.png">
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              background: '#282828',
              sidebar: '#1A1A1A',
              card: '#000000',
              accent: '#00FF41', /* Neon Green */
              muted: '#A0A0A0',
              border: '#333333'
            }
          },
          boxShadow: {
            'glow-green': '0 0 15px 2px rgba(0, 255, 65, 0.4)',
          }
        }
      }
    }
  </script>
<!-- END: External Scripts -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="layout">
    body {
      background-color: #282828;
      color: #ffffff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    
    /* Custom scrollbar for a cleaner tech look */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* Bubble connection effect for sidebar */
    .active-nav-item {
      position: relative;
      background-color: #282828;
      color: #00FF41 !important;
      border-radius: 12px 0 0 12px;
      margin-right: -32px; /* Pull into the padding area */
      padding-right: 32px;
      z-index: 10;
    }

    .active-nav-item::before,
    .active-nav-item::after {
      content: "";
      position: absolute;
      right: 0;
      width: 20px;
      height: 20px;
      background-color: transparent;
      pointer-events: none;
    }

    .active-nav-item::before {
      top: -20px;
      border-bottom-right-radius: 12px;
      box-shadow: 10px 10px 0 10px #282828;
    }

    .active-nav-item::after {
      bottom: -20px;
      border-top-right-radius: 12px;
      box-shadow: 10px -10px 0 10px #282828;
    }
  </style>
<style data-purpose="typography">
    .logo-font {
      letter-spacing: 0.15em;
      font-weight: 800;
    }
    .card-title {
      line-height: 1.4;
    }
  </style>
<!-- END: Custom Styles -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/></head>
<body class="h-full overflow-hidden flex flex-col">
<!-- BEGIN: MainHeader -->
<header class="w-full h-20 border-b border-brand-border flex items-center justify-between px-8 shrink-0 bg-brand-card">
<!-- Logo and Tagline -->
<div class="flex items-center gap-4">
<div class="flex items-center gap-3">
<img src="./favicon.png" alt="Neural Logo" class="w-7 h-7 object-contain drop-shadow-[0_0_8px_rgba(0,255,65,0.6)]">
<h1 class="text-2xl text-white font-bold tracking-wide">Neural</h1>
</div>
<span class="text-brand-muted text-sm border-l border-brand-border pl-4 ml-2">AI News Aggregator</span>
</div>
<!-- Search Bar -->
<!-- Language Selector -->
<div class="flex items-center">
<button id="lang-toggle" aria-label="Traduzir página para Português" title="Traduzir página" class="bg-brand-background border border-brand-border rounded-lg px-4 py-1.5 text-xs font-bold flex items-center gap-2 hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-[16px]">translate</span>
<span>Traduzir (PT-BR)</span>
</button>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: LayoutWrapper -->
<div class="flex flex-1 overflow-hidden">
<!-- BEGIN: Sidebar -->
<aside class="w-64 bg-brand-sidebar flex flex-col p-8 pt-16 shrink-0 relative">
<div class="mb-8">
<h2 class="text-brand-muted text-[10px] uppercase tracking-[0.2em] font-bold mb-6">Sources</h2>
<nav class="space-y-4" id="sidebar-nav">
</nav>
</div>
</aside>
<!-- END: Sidebar -->
<!-- BEGIN: MainContent -->
<main class="flex-1 overflow-y-auto p-10 bg-brand-background">
<!-- BEGIN: NewsGrid -->
<div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 font-['Noto_Sans']" style="font-family: 'Noto Sans', sans-serif;">
</div>
<!-- END: NewsGrid -->
</main>
<!-- END: MainContent -->
</div>
<!-- END: LayoutWrapper -->
<script type="module" src="./src/main.js"></script>
</body></html>
